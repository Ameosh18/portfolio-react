name: Deploy to GitHub Pages

on:
  push:
    # Deploy main (production) and any active feature branch (preview).
    # When the feature branch merges into main, the next main push
    # automatically restores the production build on Pages.
    branches:
      - main
      - 'feature/**'
      - 'claude/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # One deploy at a time. A newer push cancels an in-progress deploy
  # from the same branch so Pages always reflects the latest commit.
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

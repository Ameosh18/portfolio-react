<!DOCTYPE html>
<html lang="en">
  <head>
    <script>if(localStorage.getItem('theme')==='light')document.documentElement.setAttribute('data-theme','light');</script>
    <script>
      // Restore path redirected by 404.html
      (function() {
        var p = window.location.search.slice(1).split('&').reduce(function(q, s) {
          var kv = s.split('='); q[decodeURIComponent(kv[0])] = decodeURIComponent(kv.slice(1).join('=').replace(/~and~/g, '&')); return q;
        }, {});
        if (p.p !== undefined) {
          var path = '/' + p.p.replace(/~and~/g, '&');
          var search = p.q ? '?' + p.q.replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null, window.location.pathname + path + search + window.location.hash);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
